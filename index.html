<!DOCTYPE html>
<html lang="en"><head>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.3.0/lib/p5.js"></script><script src="https://cdn.jsdelivr.net/npm/p5.js-compatibility@0.2.0/src/data.js"></script><script src="https://cdn.jsdelivr.net/npm/p5.js-compatibility@0.2.0/src/shapes.js"></script><script src="https://cdn.jsdelivr.net/npm/p5.js-compatibility@0.2.0/src/preload.js"></script><script src="https://cdn.jsdelivr.net/npm/p5.sound@0.3.0/dist/p5.sound.min.js"></script>
    
    
    
    
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8">

  </head>
  <body>
    <main>
      <h1 class = "title">Punch block</h1>
    </main>
    <p>Gravity X:<input id="gravitySliderX" type="range" step="0.1" min="-3" max="3" value="0"><span id="gnX">0</span>, Gravity Y:<input id="gravitySliderY" type="range" step="0.1" min="-3" max="3" value="0.5"><span id="gnY">0.5</span></p>
    <p>Friction:<input id="frictionSlider" type="range" step="0.01" min="0" max="1" value="0.98"><span id="fn">0.98</span>, Bounciness:<input id="bouncinessSlider" type="range" step="0.01" min="0" max="1" value="0.7"><span id="bn">0.7</span></p>
    <p>Punch strength: <input id="punchSlider" type="range" step="0.01" min="0" max="2" value="1"><span id="ps">1</span>, Amount: <input id="amountSlider" type="range" step="1" min="1" max="1000" value="10"><span id="an">10</span></p>
    <button id="scatter">Scatter blocks</button><button id="stopMovement">Stop movement</button><button id="resetRotation">Reset Rotation</button><button id="start">Start the script</button><button id="stop">Stop the script</button>
    <script src="script3.js"></script>
    <footer>

    </footer>
</body></html>
